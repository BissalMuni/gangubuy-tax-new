name: Review Feedback
on:
  schedule:
    - cron: '17 */1 * * *' # 매시간 :17분 (UTC)
  workflow_dispatch: {} # 수동 실행 가능 (관리자 비상 정지에서도 통과)

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) 레포 체크아웃
      - uses: actions/checkout@v4

      # 2) Node.js + pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # 3) processing 좀비 회수 (self-sweep)
      - name: Sweep stale processing items
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm tsx scripts/fetch-feedback.ts --sweep-stale

      # 4) 큐 항목 조회 (cron_enabled / mode / overrides 모두 반영)
      - name: Fetch queue
        id: fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          OUT=$(pnpm tsx scripts/fetch-feedback.ts)
          ITEMS=$(echo "$OUT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);console.log(JSON.stringify(o.items||[]))})")
          COUNT=$(echo "$ITEMS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).length))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" = "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            # ID 목록을 다음 step에 전달
            IDS=$(echo "$ITEMS" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const a=JSON.parse(d);console.log(a.map(x=>x.id).join(','))})")
            echo "ids=$IDS" >> $GITHUB_OUTPUT
          fi

      # 5) processing 마킹 (AI 시작 직전에 락)
      - name: Mark processing
        if: steps.fetch.outputs.skip == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm tsx scripts/fetch-feedback.ts --mark-processing "${{ steps.fetch.outputs.ids }}"

      # 6) Claude Code 설치
      - name: Install Claude Code
        if: steps.fetch.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      # 7) DB에서 시스템 프롬프트 로드
      - name: Load system prompt
        if: steps.fetch.outputs.skip == 'false'
        id: prompt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          {
            echo 'value<<__PROMPT_EOF__'
            pnpm tsx scripts/load-prompt.ts
            echo
            echo '__PROMPT_EOF__'
          } >> $GITHUB_OUTPUT

      # 8) Claude로 피드백 반영
      - name: Apply feedback
        if: steps.fetch.outputs.skip == 'false'
        id: apply
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          claude --print --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep" \
            -p "${{ steps.prompt.outputs.value }}"

      # 9) 변경사항 커밋 + applied 마킹
      - name: Commit and mark applied
        if: steps.fetch.outputs.skip == 'false' && steps.apply.outcome == 'success'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A content/
          if git diff --cached --quiet; then
            SHA="(no-op)"
            echo "No content changes; marking applied with no-op SHA"
          else
            git commit -m "$(cat <<'EOF'
          Apply user feedback (${{ steps.fetch.outputs.count }} comments)

          Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
          EOF
          )"
            git push
            SHA=$(git rev-parse HEAD)
          fi
          pnpm tsx scripts/fetch-feedback.ts --mark-applied "${{ steps.fetch.outputs.ids }}" "$SHA"

      # 10) AI 실패 시 failed 마킹
      - name: Mark failed
        if: steps.fetch.outputs.skip == 'false' && steps.apply.outcome == 'failure'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm tsx scripts/fetch-feedback.ts --mark-failed "${{ steps.fetch.outputs.ids }}" "claude apply step failed"
