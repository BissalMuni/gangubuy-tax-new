services:
  claude-scheduler:
    container_name: gangubuy-tax-new-claude-scheduler
    build:
      context: .
      dockerfile: Dockerfile.claude
    command: ["tsx", "scripts/scheduler.ts"]
    volumes:
      - .:/workspace
      - claude_scheduler_modules:/workspace/node_modules
    env_file:
      - .env
    environment:
      # 실행 간격 (분). 기본값 30
      - SCHEDULE_INTERVAL_MINUTES=30
      # 시작 시 즉시 1회 실행 여부
      - SCHEDULE_RUN_ON_START=true
    restart: unless-stopped
    # 컨테이너 샌드박스 보안 설정 (기존 동일)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=256m

volumes:
  claude_scheduler_modules:
